name: Terraform Multi-Env Action

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run Terraform in"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read

env:
  TF_VERSION: "1.6.6"

jobs:
  run-terraform:
    name: Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})
    runs-on:
      - self-hosted
      - ${{ github.event.inputs.environment }}

    defaults:
      run:
        shell: bash
        working-directory: environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      # - name: Terraform Validate
      #   run: terraform validate

      - name: Terraform ${{ github.event.inputs.action }}
        env:
          TF_ACTION: ${{ github.event.inputs.action }}
          TF_ENV: ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail

          case "$TF_ENV" in
            dev)
              TFVARS_FILE="dev.tfvars"
              ;;
            uat)
              TFVARS_FILE="uat.tfvars"
              ;;
            prod)
              TFVARS_FILE="prod.tfvars"
              ;;
            *)
              echo "ERROR: Unsupported environment '$TF_ENV'"
              exit 1
              ;;
          esac

          TF_ARGS=(-input=false -no-color)

          if [ ! -f "$TFVARS_FILE" ]; then
            echo "ERROR: Expected tfvars file '$TFVARS_FILE' not found in $(pwd)"
            exit 1
          fi
          TF_ARGS+=("-var-file=$TFVARS_FILE")

          case "$TF_ACTION" in
            plan)
              terraform plan "${TF_ARGS[@]}"
              ;;
            apply)
              terraform apply -auto-approve "${TF_ARGS[@]}"
              ;;
            destroy)
              terraform destroy -auto-approve "${TF_ARGS[@]}"
              ;;
            *)
              echo "ERROR: Unsupported action '$TF_ACTION'"
              exit 1
              ;;
          esac
