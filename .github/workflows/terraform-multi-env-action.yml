name: Terraform plan / apply / destroy (Multi-Environment)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run Terraform in"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
  push:
    branches:
      - uat
      - master

permissions:
  contents: read

env:
  TF_VERSION: "1.6.6"
  SENTINEL_VERSION: "0.40.0"

jobs:
  run-terraform:
    name: Terraform ${{ github.event_name == 'push' && github.ref_name == 'uat' && 'apply' || github.event_name == 'push' && github.ref_name == 'master' && 'plan' || github.event.inputs.action }} (${{ github.event_name == 'push' && github.ref_name == 'uat' && 'uat' || github.event_name == 'push' && github.ref_name == 'master' && 'prod' || github.event.inputs.environment }})
    # Runner label mapping lives in the expression below.
    # Update labels here if your self-hosted runner labels differ:
    # - dev  -> 'dev'
    # - uat  -> 'uat'
    # - prod -> 'uat' (temporary fallback)
    runs-on:
      - self-hosted
      - ${{ (github.event_name == 'push' && github.ref_name == 'uat' && 'uat' || github.event_name == 'push' && github.ref_name == 'master' && 'prod' || github.event.inputs.environment) == 'dev' && 'dev' || (github.event_name == 'push' && github.ref_name == 'uat' && 'uat' || github.event_name == 'push' && github.ref_name == 'master' && 'prod' || github.event.inputs.environment) == 'uat' && 'uat' || 'uat' }}

    defaults:
      run:
        shell: bash
        working-directory: environments/${{ github.event_name == 'push' && github.ref_name == 'uat' && 'uat' || github.event_name == 'push' && github.ref_name == 'master' && 'prod' || github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Sentinel
        working-directory: .
        run: |
          set -euo pipefail

          if command -v sentinel >/dev/null 2>&1; then
            echo "Sentinel already available:"
            sentinel version
            exit 0
          fi

          echo "Installing Sentinel ${SENTINEL_VERSION}..."
          curl -fsSL -o /tmp/sentinel.zip \
            "https://releases.hashicorp.com/sentinel/${SENTINEL_VERSION}/sentinel_${SENTINEL_VERSION}_linux_amd64.zip"

          mkdir -p "$RUNNER_TEMP/bin"
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/sentinel.zip').extractall('/tmp')"
          install -m 0755 /tmp/sentinel "$RUNNER_TEMP/bin/sentinel"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Sentinel policy scan
        working-directory: .
        env:
          TF_ENV: ${{ github.event_name == 'push' && github.ref_name == 'uat' && 'uat' || github.event_name == 'push' && github.ref_name == 'master' && 'prod' || github.event.inputs.environment }}
        run: |
          set -euo pipefail

          case "$TF_ENV" in
            dev)
              TFVARS_FILE="environments/dev/dev.tfvars"
              BACKEND_FILE="environments/dev/backend.tf"
              POLICY_GLOB="sentinel/policies/dev_*.sentinel"
              ;;
            uat)
              TFVARS_FILE="environments/uat/uat.tfvars"
              BACKEND_FILE="environments/uat/backend.tf"
              POLICY_GLOB="sentinel/policies/uat_*.sentinel"
              ;;
            prod)
              TFVARS_FILE="environments/prod/prod.tfvars"
              BACKEND_FILE="environments/prod/backend.tf"
              POLICY_GLOB="sentinel/policies/prod_*.sentinel"
              ;;
            *)
              echo "ERROR: Unsupported environment '$TF_ENV' for Sentinel policy scan."
              exit 1
              ;;
          esac

          TFVARS_EXISTS=false
          TFVARS_ENV_OK=false
          TFVARS_REGION_OK=false
          TFVARS_TEAM_PRESENT=false
          TFVARS_ORG_PRESENT=false
          BACKEND_USES_S3=false

          if [ -f "$TFVARS_FILE" ]; then
            TFVARS_EXISTS=true
            grep -Eq "^[[:space:]]*env[[:space:]]*=[[:space:]]*\"${TF_ENV}\"([[:space:]]*#.*)?[[:space:]]*$" "$TFVARS_FILE" && TFVARS_ENV_OK=true || true
            grep -Eq '^[[:space:]]*(region|aws_region)[[:space:]]*=[[:space:]]*"us-gov-west-1"([[:space:]]*#.*)?[[:space:]]*$' "$TFVARS_FILE" && TFVARS_REGION_OK=true || true
            grep -Eq '^[[:space:]]*team[[:space:]]*=[[:space:]]*".+"([[:space:]]*#.*)?[[:space:]]*$' "$TFVARS_FILE" && TFVARS_TEAM_PRESENT=true || true
            grep -Eq '^[[:space:]]*organization[[:space:]]*=[[:space:]]*".+"([[:space:]]*#.*)?[[:space:]]*$' "$TFVARS_FILE" && TFVARS_ORG_PRESENT=true || true
          fi

          if [ -f "$BACKEND_FILE" ]; then
            grep -Eq '^[[:space:]]*backend[[:space:]]+"s3"[[:space:]]*\{' "$BACKEND_FILE" && BACKEND_USES_S3=true || true
          fi

          GLOBAL_ARGS=(
            -global environment_is_selected=true
            -global tfvars_exists=${TFVARS_EXISTS}
            -global tfvars_env_ok=${TFVARS_ENV_OK}
            -global tfvars_region_ok=${TFVARS_REGION_OK}
            -global tfvars_team_present=${TFVARS_TEAM_PRESENT}
            -global tfvars_org_present=${TFVARS_ORG_PRESENT}
            -global backend_uses_s3=${BACKEND_USES_S3}
          )

          shopt -s nullglob
          POLICIES=( $POLICY_GLOB )
          shopt -u nullglob

          if [ "${#POLICIES[@]}" -eq 0 ]; then
            echo "ERROR: No Sentinel policies found for env '$TF_ENV' using pattern '$POLICY_GLOB'"
            exit 1
          fi

          echo "Running Sentinel policies:"
          for POLICY_FILE in "${POLICIES[@]}"; do
            echo "  - $POLICY_FILE"
            sentinel apply "${GLOBAL_ARGS[@]}" "$POLICY_FILE"
          done

      - name: Setup Terraform
        working-directory: .
        run: |
          set -euo pipefail

          if command -v terraform >/dev/null 2>&1; then
            echo "Terraform already available:"
            terraform version
            exit 0
          fi

          echo "Installing Terraform ${TF_VERSION}..."
          curl -fsSL -o /tmp/terraform.zip \
            "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"

          mkdir -p "$RUNNER_TEMP/bin"
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/terraform.zip').extractall('/tmp')"
          install -m 0755 /tmp/terraform "$RUNNER_TEMP/bin/terraform"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform ${{ github.event_name == 'push' && github.ref_name == 'uat' && 'apply' || github.event_name == 'push' && github.ref_name == 'master' && 'plan' || github.event.inputs.action }}
        env:
          TF_ACTION: ${{ github.event_name == 'push' && github.ref_name == 'uat' && 'apply' || github.event_name == 'push' && github.ref_name == 'master' && 'plan' || github.event.inputs.action }}
          TF_ENV: ${{ github.event_name == 'push' && github.ref_name == 'uat' && 'uat' || github.event_name == 'push' && github.ref_name == 'master' && 'prod' || github.event.inputs.environment }}
        run: |
          set -euo pipefail

          case "$TF_ENV" in
            dev)
              TFVARS_FILE="dev.tfvars"
              ;;
            uat)
              TFVARS_FILE="uat.tfvars"
              ;;
            prod)
              TFVARS_FILE="prod.tfvars"
              ;;
            *)
              echo "ERROR: Unsupported environment '$TF_ENV'"
              exit 1
              ;;
          esac

          TF_ARGS=(-input=false -no-color)

          if [ ! -f "$TFVARS_FILE" ]; then
            echo "ERROR: Expected tfvars file '$TFVARS_FILE' not found in $(pwd)"
            exit 1
          fi
          TF_ARGS+=("-var-file=$TFVARS_FILE")

          case "$TF_ACTION" in
            plan)
              terraform plan "${TF_ARGS[@]}"
              ;;
            apply)
              terraform apply -auto-approve "${TF_ARGS[@]}"
              ;;
            destroy)
              terraform destroy -auto-approve "${TF_ARGS[@]}"
              ;;
            *)
              echo "ERROR: Unsupported action '$TF_ACTION'"
              exit 1
              ;;
          esac

  manual-approval-prod:
    name: Manual approval (prod)
    if: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
    needs: run-terraform
    # Configure required reviewers in this environment to enforce
    # a manual approval gate before prod apply.
    environment:
      name: prod-approval
    runs-on:
      - self-hosted
      - uat
    steps:
      - name: Await manual approval
        run: echo "Waiting for manual approval via environment protection rules."

  approve-and-apply-prod:
    name: Terraform apply (prod after approval)
    if: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
    needs: manual-approval-prod
    # Production approval job runs on the prod-labeled runner.
    # Change 'prod' below if your production runner uses a different label.
    runs-on:
      - self-hosted
      - uat
    environment:
      name: prod
    defaults:
      run:
        shell: bash
        working-directory: environments/prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        working-directory: .
        run: |
          set -euo pipefail

          if command -v terraform >/dev/null 2>&1; then
            echo "Terraform already available:"
            terraform version
            exit 0
          fi

          echo "Installing Terraform ${TF_VERSION}..."
          curl -fsSL -o /tmp/terraform.zip \
            "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"

          mkdir -p "$RUNNER_TEMP/bin"
          python3 -c "import zipfile; zipfile.ZipFile('/tmp/terraform.zip').extractall('/tmp')"
          install -m 0755 /tmp/terraform "$RUNNER_TEMP/bin/terraform"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply (prod)
        run: terraform apply -auto-approve -input=false -no-color -var-file=prod.tfvars
