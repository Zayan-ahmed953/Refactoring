name: Terraform Multi-Env Action

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run Terraform in"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      action:
        description: "Terraform action to run"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.1.9"

jobs:
  run-terraform:
    name: Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # - name: Select account secret name for environment
      #   id: account
      #   run: |
      #     set -euo pipefail

      #     case "${{ github.event.inputs.environment }}" in
      #       dev)
      #         echo "role_secret_name=AWS_ROLE_ARN_DEV" >> "$GITHUB_OUTPUT"
      #         ;;
      #       uat)
      #         echo "role_secret_name=AWS_ROLE_ARN_UAT" >> "$GITHUB_OUTPUT"
      #         ;;
      #       prod)
      #         echo "role_secret_name=AWS_ROLE_ARN_PROD" >> "$GITHUB_OUTPUT"
      #         ;;
      #       *)
      #         echo "ERROR: No AWS account secret mapping defined for environment '${{ matrix.environment }}'."
      #         echo "Add a case mapping and corresponding secret."
      #         exit 1
      #         ;;
      #     esac

      # - name: Validate mapped AWS role secret exists
      #   env:
      #     ROLE_TO_ASSUME: ${{ secrets[steps.account.outputs.role_secret_name] }}
      #   run: |
      #     set -euo pipefail
      #     if [ -z "${ROLE_TO_ASSUME}" ]; then
      #       echo "ERROR: Secret '${{ steps.account.outputs.role_secret_name }}' is missing or empty."
      #       exit 1
      #     fi

      # - name: Configure AWS credentials for environment
      #   uses: aws-actions/configure-aws-credentials@v2
      #   with:
      #     role-to-assume: ${{ secrets[steps.account.outputs.role_secret_name] }}
      #     aws-region: us-gov-west-1
      #     role-session-name: tf-${{ github.event.inputs.environment }}-${{ github.run_id }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform ${{ github.event.inputs.action }}
        env:
          TF_ACTION: ${{ github.event.inputs.action }}
        run: |
          set -euo pipefail

          TFVARS_FILE="${{ github.event.inputs.environment }}.tfvars"
          TF_ARGS=(-input=false -no-color)

          if [ -f "$TFVARS_FILE" ]; then
            TF_ARGS+=("-var-file=$TFVARS_FILE")
          else
            echo "No $TFVARS_FILE found. Running without a var-file."
          fi

          case "$TF_ACTION" in
            plan)
              terraform plan "${TF_ARGS[@]}"
              ;;
            apply)
              terraform apply -auto-approve "${TF_ARGS[@]}"
              ;;
            destroy)
              terraform destroy -auto-approve "${TF_ARGS[@]}"
              ;;
            *)
              echo "ERROR: Unsupported action '$TF_ACTION'"
              exit 1
              ;;
          esac
