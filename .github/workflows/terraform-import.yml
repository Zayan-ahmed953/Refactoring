name: Terraform Import / Plan / Apply (Manual)

on:
  workflow_dispatch:
    inputs:
      root_dir:
        description: "Terraform root to run (e.g. environments/dev, stacks/lambda, stacks/glue, stacks/s3)"
        required: true
        default: "environments/dev"
      environment:
        description: "Terraform workspace/environment (dev, uat, prod)"
        required: true
        default: "dev"
      action:
        description: "What to do"
        required: true
        type: choice
        options:
          - plan
          - apply
          - import_then_plan
      tfvars_file:
        description: "Var-file path (relative to root_dir). Example: dev.tfvars or vars/dev.tfvars. Leave empty to skip."
        required: false
        default: ""
      deploy_modules:
        description: "Optional: for environments/* roots that support deploy_modules. Example: [\"ec2\",\"s3\"] or [] to skip."
        required: false
        default: ""
      imports:
        description: |
          Optional (required for import_then_plan):
          One import per line, format: <resource_address>=<import_id>
          Example:
            module.s3.aws_s3_bucket.standard=dccc-standard-bucket
            aws_iam_role.example=MyRoleName
        required: false
        default: ""
      aws_region:
        description: "AWS region"
        required: true
        default: "us-gov-west-1"
      role_to_assume:
        description: "IAM role ARN for GitHub OIDC to assume"
        required: true
        default: ""

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: 1.1.9

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ github.event.inputs.role_to_assume }}
          aws-region: ${{ github.event.inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate inputs
        run: |
          set -euo pipefail

          ROOT="${{ github.event.inputs.root_dir }}"
          ACTION="${{ github.event.inputs.action }}"
          ENV_NAME="${{ github.event.inputs.environment }}"
          TFVARS="${{ github.event.inputs.tfvars_file }}"
          IMPORTS="${{ github.event.inputs.imports }}"

          if [ ! -d "$ROOT" ]; then
            echo "ERROR: root_dir '$ROOT' does not exist."
            exit 1
          fi

          if [ ! -f "$ROOT/main.tf" ] && [ -z "$(ls -1 "$ROOT"/*.tf 2>/dev/null || true)" ]; then
            echo "ERROR: root_dir '$ROOT' does not look like a Terraform root (no .tf files found)."
            exit 1
          fi

          if [ "$ACTION" = "import_then_plan" ] && [ -z "$IMPORTS" ]; then
            echo "ERROR: imports is required when action=import_then_plan."
            exit 1
          fi

          echo "Inputs OK:"
          echo "  root_dir=$ROOT"
          echo "  environment(workspace)=$ENV_NAME"
          echo "  action=$ACTION"
          echo "  tfvars_file=$TFVARS"

      - name: Terraform Init
        run: |
          set -euo pipefail
          terraform -chdir="${{ github.event.inputs.root_dir }}" init -input=false -reconfigure

      - name: Select/Create workspace
        run: |
          set -euo pipefail
          ROOT="${{ github.event.inputs.root_dir }}"
          ENV_NAME="${{ github.event.inputs.environment }}"
          terraform -chdir="$ROOT" workspace list | grep -qE "^[* ]\\s*${ENV_NAME}$" \
            && terraform -chdir="$ROOT" workspace select "$ENV_NAME" \
            || terraform -chdir="$ROOT" workspace new "$ENV_NAME"

      - name: Pre-import state snapshot (optional)
        if: ${{ github.event.inputs.action == 'import_then_plan' }}
        run: |
          set -euo pipefail
          ROOT="${{ github.event.inputs.root_dir }}"
          terraform -chdir="$ROOT" state list | sort > pre_import_state.txt || true
          echo "Saved pre_import_state.txt"

      - name: Terraform Import (loop)
        if: ${{ github.event.inputs.action == 'import_then_plan' }}
        run: |
          set -euo pipefail
          ROOT="${{ github.event.inputs.root_dir }}"
          IMPORTS="${{ github.event.inputs.imports }}"

          echo "Running terraform import(s) in: $ROOT"
          echo "$IMPORTS" | sed '/^[[:space:]]*$/d' > imports.txt
          echo "=== imports.txt ==="
          cat imports.txt

          while IFS= read -r line; do
            # Allow comments
            case "$line" in
              \#*) continue ;;
            esac

            addr="${line%%=*}"
            id="${line#*=}"

            addr="$(echo "$addr" | xargs)"
            id="$(echo "$id" | xargs)"

            if [ -z "$addr" ] || [ -z "$id" ]; then
              echo "ERROR: invalid import line: '$line'"
              echo "Expected: <resource_address>=<import_id>"
              exit 1
            fi

            echo "Importing: $addr  <=  $id"
            terraform -chdir="$ROOT" import -input=false "$addr" "$id"
          done < imports.txt

      - name: Post-import state snapshot (optional)
        if: ${{ github.event.inputs.action == 'import_then_plan' }}
        run: |
          set -euo pipefail
          ROOT="${{ github.event.inputs.root_dir }}"
          terraform -chdir="$ROOT" state list | sort > post_import_state.txt || true
          echo "Saved post_import_state.txt"

      - name: Terraform Plan (always for plan/import_then_plan)
        if: ${{ github.event.inputs.action != 'apply' }}
        run: |
          set -euo pipefail
          ROOT="${{ github.event.inputs.root_dir }}"
          TFVARS="${{ github.event.inputs.tfvars_file }}"
          DEPLOY_MODULES="${{ github.event.inputs.deploy_modules }}"

          args=(plan -input=false -no-color)

          if [ -n "$DEPLOY_MODULES" ]; then
            args+=("-var=deploy_modules=${DEPLOY_MODULES}")
          fi

          if [ -n "$TFVARS" ]; then
            if [ ! -f "$ROOT/$TFVARS" ]; then
              echo "ERROR: tfvars_file '$TFVARS' not found under root_dir '$ROOT'."
              exit 1
            fi
            args+=("-var-file=$TFVARS")
          fi

          # Exit code 2 means "diff present" (useful signal), so capture it
          set +e
          terraform -chdir="$ROOT" "${args[@]}" -detailed-exitcode
          code=$?
          set -e

          if [ $code -eq 0 ]; then
            echo "Plan: no changes."
          elif [ $code -eq 2 ]; then
            echo "Plan: changes detected."
          else
            echo "Plan failed with exit code: $code"
            exit $code
          fi

      - name: Terraform Apply (manual run)
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          set -euo pipefail
          ROOT="${{ github.event.inputs.root_dir }}"
          TFVARS="${{ github.event.inputs.tfvars_file }}"
          DEPLOY_MODULES="${{ github.event.inputs.deploy_modules }}"

          args=(apply -auto-approve -input=false -no-color)

          if [ -n "$DEPLOY_MODULES" ]; then
            args+=("-var=deploy_modules=${DEPLOY_MODULES}")
          fi

          if [ -n "$TFVARS" ]; then
            if [ ! -f "$ROOT/$TFVARS" ]; then
              echo "ERROR: tfvars_file '$TFVARS' not found under root_dir '$ROOT'."
              exit 1
            fi
            args+=("-var-file=$TFVARS")
          fi

          terraform -chdir="$ROOT" "${args[@]}"

      - name: Upload artifacts (state snapshots / imports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-import-artifacts
          path: |
            pre_import_state.txt
            post_import_state.txt
            imports.txt
          if-no-files-found: ignore

